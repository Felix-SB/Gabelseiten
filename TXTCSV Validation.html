<!DOCTYPE html>

<head>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: rgb(41, 44, 37);
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            background: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        .header {
            background-color: #4CAF50;
            padding: 0px;
            text-align: center;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .logo {
            max-width: 200px;
            margin-right: auto;
        }

        h1 {
            font-size: 24px;
            margin: 12px;
        }

        main {
            display: flex;
            padding: 20px;
            flex-direction: column;
            align-items: center;
        }

        .file-input,
        .dropdown {
            margin: 10px auto;
            padding: 10px;
            font-size: 16px;
        }

        .validate-button,
        .clear-button {
            display: inline-block;
            width: 48%;
            padding: 10px;
            font-size: 18px;
            margin: 5px 1%;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .validate-button {
            background-color: #4CAF50;
            color: white;
        }

        .validate-button:hover {
            background-color: #45a049;
        }

        .clear-button {
            background-color: #f44336;
            color: white;
        }

        .clear-button:hover {
            background-color: #e53935;
        }

        .results {
            margin-top: 20px;
            border-top: 1px solid #ddd;
            padding-top: 20px;
        }

        h2 {
            font-size: 20px;
            margin-bottom: 10px;
            text-align: center;
        }

        .errors {
            background: #f9f9f9;
            border: 1px solid #ddd;
            padding: 10px;
            font-size: 14px;
            white-space: pre-wrap; /* Keep line breaks */
            word-wrap: break-word; /* Wrap long lines */
            overflow-x: auto;
            max-height: 300px;
        }

        .file-content {
            display: none;
        }
    </style>
</head>

        <div id="results" class="results">
            <h2>Validation Results</h2>
            <pre id="errors" class="errors"></pre>
        </div>
    </main>
</div>

            "Kaliber": {"type": "char"},
            "Marke": {"type": "char"},
            "Tags": {"type": "char"},
            "Lief. Kürzel": {"type": "char"},
            "Vertrieblicher Ursprung": {"type": "char"},
            "Sonstiger Text": {"type": "char"},
            "GMO": {"type": "char", "allowedValues": ["Ja", "Nein", ""]},
            "Gefahrgutnummer": {"type": "char"},
            "Beförderungskategorie": {"type": "char"},
            "Begrenzte Menge": {"type": "char", "allowedValues": ["Ja", "Nein", ""]},
            "Gefahrstoffgewicht": {"type": "num", "decimal": true},
            "Modularer Artikeltext": {"type": "char"},
            "ASC": {"type": "char", "allowedValues": ["Ja", "Nein", ""]},
            "Inaktiv Kennzeichen": {"type": "char", "allowedValues": ["Ja", "Nein", ""]},
            "Inaktiv Datum": {"type": "char"}, // Could be date-like
            "Hauptlieferant": {"type": "char", "cannotBeEmpty": true},
            "Eigenmarke": {"type": "char", "allowedValues": ["Ja", "Nein", ""]},
            "ServisaID": {"type": "num", "cannotBeEmpty": true}
        }
    };

    function validateField(value, rule, fieldName) {
        // Trim the value before validation? Usually yes for non-fixed-width.
        // For fixed-width, trimming might remove intentional padding.
        // Let's keep the value as extracted for now, handle trimming based on type if needed.
        const trimmedValue = value.trim(); // Use trimmed value for emptiness checks

        if (rule.cannotBeEmpty && trimmedValue === "") {
            return `Field '${fieldName}' cannot be empty.`;
        }

        // Skip further validation if the field is allowed to be empty and is empty
        if (trimmedValue === "" && !rule.cannotBeEmpty) {
            return null;
        }

        if (rule.type === 'char') {
            // Use the original 'value' for allowedValues check if padding matters
            if (rule.allowedValues && !rule.allowedValues.includes(value)) {
                // If padding doesn't matter, check trimmedValue instead:
                // if (rule.allowedValues && !rule.allowedValues.includes(trimmedValue)) {
                return `Invalid value "${value}". Allowed values for '${fieldName}': ${rule.allowedValues.join(', ')}.`;
            }
            // Add regex check if defined
            if (rule.regex && !rule.regex.test(value)) {
                 return `Value "${value}" in '${fieldName}' does not match the required pattern.`;
            }
        } else if (rule.type === 'num') {
            // For numeric checks, always use the trimmed value
            const numericString = rule.decimal ? trimmedValue.replace(',', '.') : trimmedValue;

            if (isNaN(parseFloat(numericString)) || !isFinite(numericString)) {
                 // Check if it's just empty and allowed to be
                 if (trimmedValue === "" && !rule.cannotBeEmpty) {
                     return null;
                 }
                return `Value "${value}" in '${fieldName}' is not a valid number.`;
            }
            // Check allowed values (compare as strings, as file might have '01' vs 1)
            if (rule.allowedValues && !rule.allowedValues.map(String).includes(trimmedValue)) {
                return `Invalid value "${value}" in '${fieldName}'. Allowed values: ${rule.allowedValues.join(', ')}.`;
            }
            // Optional: Check decimal places if rule.decimalPlaces is set
            if (rule.decimal && rule.decimalPlaces !== undefined) {
                const decimalPart = (numericString.split('.')[1] || '');
                if (decimalPart.length > rule.decimalPlaces) {
                    return `Value "${value}" in '${fieldName}' has too many decimal places. Max ${rule.decimalPlaces} allowed.`;
                }
                 // Could also enforce minimum decimal places if needed
                 // if (decimalPart.length < rule.decimalPlaces) {
                 //    return `Value "${value}" in '${fieldName}' requires exactly ${rule.decimalPlaces} decimal places.`;
                 // }
            }

        } else if (rule.type === 'date') {
            // Use trimmed value for date checks
            if (!/^\d{8}$/.test(trimmedValue)) {
                return `Date "${value}" in '${fieldName}' is not in YYYYMMDD format (8 digits).`;
            }
            // Optional: Add stricter date validity check (e.g., month 1-12, day 1-31)
            const year = parseInt(trimmedValue.substring(0, 4), 10);
            const month = parseInt(trimmedValue.substring(4, 6), 10);
            const day = parseInt(trimmedValue.substring(6, 8), 10);
            if (month < 1 || month > 12 || day < 1 || day > 31) { // Basic check
                 return `Date "${value}" in '${fieldName}' appears invalid (Month: ${month}, Day: ${day}).`;
            }
            // More robust: const d = new Date(year, month - 1, day); if (d.getFullYear() !== year || d.getMonth() !== month - 1 || d.getDate() !== day) return 'Invalid date';

        }
        // Removed mustBeEmpty check as cannotBeEmpty covers the inverse logic more commonly needed.
        // if (rule.mustBeEmpty && trimmedValue !== "") {
        //     return `Field '${fieldName}' must be empty, but it contains "${value}".`;
        // }

        return null; // No error
    }

    function validateRow(rowNumber, row, rules, isTabSeparated, expectedLength = null, isCsv = false) {
        const errors = [];
        const originalRow = row; // Keep original for length checks if needed

        if (isCsv) {
            // CSV: Split by semicolon, check field count
            const trimmedRow = row.trimEnd(); // Trim trailing whitespace only
            const fields = trimmedRow.split(';');
            const expectedFieldCount = Object.keys(rules).length;

            if (fields.length !== expectedFieldCount) {
                errors.push(`Expected ${expectedFieldCount} fields (columns), but found ${fields.length}. Check semicolons.`);
                // Don't proceed with field validation if column count is wrong
                return errors;
            }

            const rowValues = {}; // Store values for dependency checks
            fields.forEach((fieldValue, fieldIndex) => {
                 const fieldName = Object.keys(rules)[fieldIndex];
                 rowValues[fieldName] = fieldValue.trim(); // Store trimmed value
            });

            Object.keys(rules).forEach((fieldName, fieldIndex) => {
                const rule = rules[fieldName];
                const fieldValue = fields[fieldIndex].trim(); // Use trimmed value for validation

                let dependencyCheckPassed = true;
                if (rule.dependency) {
                    const dependencyFieldName = rule.dependency.field;
                    const dependencyFieldValue = rowValues[dependencyFieldName] || ''; // Get dependency value

                    if (!rule.dependency.values.map(String).includes(dependencyFieldValue)) {
                        dependencyCheckPassed = false;
                        // Check if the field contains anything other than spaces or zeros (assuming same padding logic might apply)
                        if (/[^ 0]/.test(fieldValue)) {
                             errors.push(`Field '${fieldName}' should likely be empty/zeros because '${dependencyFieldName}' is '${dependencyFieldValue}', not one of [${rule.dependency.values.join(', ')}]. Found: "${fieldValue}".`);
                        }
                    }
                }

                if (dependencyCheckPassed) {
                    // Validate the trimmed field value for CSV
                    const error = validateField(fieldValue, rule, fieldName);
                    if (error) errors.push(`Field '${fieldName}': ${error}`);
                }
            });

        } else if (isTabSeparated) {
            // TSV: Split by tab, check field count
            const trimmedRow = row.trimEnd(); // Trim trailing whitespace only
            const fields = trimmedRow.split('\t');
            const expectedFieldCount = Object.keys(rules).length;

            if (fields.length !== expectedFieldCount) {
                 errors.push(`Expected ${expectedFieldCount} fields (columns), but found ${fields.length}. Check tabs.`);
                 // Don't proceed if column count is wrong
                 return errors;
            }

            const rowValues = {}; // Store values for dependency checks
            fields.forEach((fieldValue, fieldIndex) => {
                 const fieldName = Object.keys(rules)[fieldIndex];
                 rowValues[fieldName] = fieldValue.trim(); // Store trimmed value
            });


            Object.keys(rules).forEach((fieldName, fieldIndex) => {
                const rule = rules[fieldName];
                const fieldValue = fields[fieldIndex].trim(); // Use trimmed value for validation

                let dependencyCheckPassed = true;
                if (rule.dependency) {
                    const dependencyFieldName = rule.dependency.field;
                    const dependencyFieldValue = rowValues[dependencyFieldName] || ''; // Get dependency value

                    if (!rule.dependency.values.map(String).includes(dependencyFieldValue)) {
                        dependencyCheckPassed = false;
                        // Check if the field contains anything other than spaces or zeros (assuming same padding logic might apply)
                        if (/[^ 0]/.test(fieldValue)) {
                             errors.push(`Field '${fieldName}' should likely be empty/zeros because '${dependencyFieldName}' is '${dependencyFieldValue}', not one of [${rule.dependency.values.join(', ')}]. Found: "${fieldValue}".`);
                        }
                    }
                }

                if (dependencyCheckPassed) {
                    // Validate the trimmed field value for TSV
                    const error = validateField(fieldValue, rule, fieldName);
                    if (error) errors.push(`Field '${fieldName}': ${error}`);
                }
            });

        } else { // Fixed-width (KDARTPRS, Kunden)
            // 1. Check for Tabs (should not exist in fixed-width)
            if (row.includes('\t')) {
                errors.push(`Row contains tabs, which are invalid for fixed-width format.`);
                // Stop validation for this row if tabs are present? Or continue? Let's continue for now.
            }

            // 2. Length Check (use original row before trimming)
            if (expectedLength !== null && row.length !== expectedLength) {
                // Allow one trailing space (common issue)
                if (!(row.length === expectedLength + 1 && row.endsWith(' '))) {
                     errors.push(`Row length is incorrect. Expected ${expectedLength}, found ${row.length}.`);
                     // Stop validation for this row if length is wrong? Probably best.
                     return errors;
                }
                 // If we allow the trailing space, use the trimmed version for field extraction
                 row = row.trimEnd();
            }

            // 3. Extract and Validate Fields based on position and length
            const rowValues = {}; // Store extracted values for dependency checks
            for (const [fieldName, rule] of Object.entries(rules)) {
                if (rule.position && rule.length) {
                    // Extract the raw field value based on position/length
                    const fieldValue = row.substring(rule.position - 1, rule.position - 1 + rule.length);
                    rowValues[fieldName] = fieldValue; // Store raw value (validateField will handle trimming if needed)
                } else {
                     console.warn(`Rule for field '${fieldName}' is missing position or length for fixed-width validation.`);
                }
            }

            // 4. Perform Validation including Dependencies
             for (const [fieldName, rule] of Object.entries(rules)) {
                 const fieldValue = rowValues[fieldName]; // Get stored value

                 if (fieldValue === undefined) continue; // Skip if extraction failed

                 let dependencyCheckPassed = true;
                 if (rule.dependency) {
                     const dependencyFieldName = rule.dependency.field;
                     // Use trimmed dependency value for the check itself
                     const dependencyFieldValue = (rowValues[dependencyFieldName] || '').trim();

                     if (!rule.dependency.values.map(String).includes(dependencyFieldValue)) {
                         dependencyCheckPassed = false;
                         // Check if the field contains anything other than spaces or zeros
                         // Use the raw fieldValue (before trimming) for this check
                         if (/[^ 0]/.test(fieldValue)) { // <--- MODIFIED CHECK HERE for fixed-width
                              errors.push(`Field '${fieldName}' should only contain spaces or zeros because '${dependencyFieldName}' is '${dependencyFieldValue}', not one of [${rule.dependency.values.join(', ')}]. Found non-zero/non-space value: "${fieldValue}".`);
                         }
                     }
                 }

                 if (dependencyCheckPassed) {
                     // Pass the raw extracted value to validateField.
                     // validateField will decide whether to trim based on type/rules.
                     const error = validateField(fieldValue, rule, fieldName);
                     if (error) errors.push(`Field '${fieldName}': ${error}`);
                 }
             }
        }
        return errors;
    }

    validateButton.addEventListener('click', () => {
        errors.textContent = 'Validating...'; // Provide immediate feedback
        fileInput.disabled = true;
        validateButton.disabled = true;
        clearButton.disabled = true;
        fileTypeDropdown.disabled = true;

        // Use setTimeout to allow the UI to update before heavy processing
        setTimeout(() => {
            try { // Wrap main logic in try...finally
                const file = fileInput.files[0];
                if (!file) {
                    errors.textContent = 'Please select a file.';
                    // No return here, finally block will still execute
                } else {
                    const fileType = fileTypeDropdown.value;
                    const selectedRules = rules[fileType];
                    if (!selectedRules) {
                         errors.textContent = `Error: No validation rules defined for selected type '${fileType}'.`;
                         // No return here, finally block will still execute
                    } else {
                        const isTabSeparated = fileType === 'ARTIKEL_EXT';
                        const isCsv = fileType === 'csv_rules';

                        // --- Determine Expected Length for Fixed-Width ---
                        let expectedLength = null;
                        if (fileType === 'KDARTPRS') {
                            expectedLength = 40;
                        } else if (fileType === 'Kunden') {
                            expectedLength = 524; // Calculated length for Kunden.TXT
                        }
                        // --- End Expected Length ---

                        const reader = new FileReader();
                        reader.onload = () => {
                            try { // Wrap file processing in try...catch
                                const fileContent = reader.result;
                                // Use robust line splitting
                                const rows = fileContent.split(/\r?\n/);
                                const validationErrors = [];

                                // Remove potential trailing empty line caused by final newline
                                if (rows.length > 0 && rows[rows.length - 1].trim() === '') {
                                    rows.pop();
                                }

                                for (const [rowIndex, row] of rows.entries()) {
                                    // Skip header row for ARTIKEL_EXT (TSV)
                                    if (isTabSeparated && rowIndex === 0) {
                                        continue;
                                    }
                                     // Skip header row for LMIV.CSV (CSV) - Assuming first row is header
                                     if (isCsv && rowIndex === 0) {
                                        // Optional: Validate header row structure/names here if needed
                                        continue;
                                    }

                                    // Skip genuinely empty rows (containing absolutely nothing)
                                    if (row.length === 0) {
                                        // validationErrors.push(`Row ${rowIndex + 1}: Skipped empty line.`); // Optional logging
                                        continue;
                                    }
                                     // Check for rows containing only whitespace (might be an error)
                                     if (row.trim().length === 0) {
                                         validationErrors.push(`Row ${rowIndex + 1}: Row contains only whitespace.`);
                                         continue; // Treat as error and skip validation
                                     }


                                    const rowErrors = validateRow(rowIndex + 1, row, selectedRules, isTabSeparated, expectedLength, isCsv);
                                    if (rowErrors.length > 0) {
                                        // Combine errors for the row, ensuring field names are included
                                        const errorString = rowErrors.map(e => e.startsWith('Field') ? e : `Error: ${e}`).join('; ');
                                        validationErrors.push(`Row ${rowIndex + 1}: ${errorString}`);
                                    }
                                }
                                errors.textContent = validationErrors.length > 0 ? validationErrors.join('\n') : 'Validation Complete: No errors found.';
                            } catch (parseError) {
                                 console.error("Error during file processing:", parseError);
                                 errors.textContent = `Error during file processing: ${parseError.message}`;
                            } finally {
                                // Re-enable UI after processing finishes (success or error)
                                fileInput.disabled = false;
                                validateButton.disabled = false;
                                clearButton.disabled = false;
                                fileTypeDropdown.disabled = false;
                            }
                        };
                        reader.onerror = () => {
                            errors.textContent = 'Error reading file.';
                            console.error("FileReader error:", reader.error);
                            // Re-enable UI even if reading fails
                            fileInput.disabled = false;
                            validateButton.disabled = false;
                            clearButton.disabled = false;
                            fileTypeDropdown.disabled = false;
                        };
                        reader.readAsText(file, 'UTF-8'); // Specify encoding if known (UTF-8 is common, but check file source)
                        // If files might be ANSI/Windows-1252, you might need more complex encoding detection or user selection.
                    }
                }
            } catch (error) {
                console.error("Error during validation setup:", error);
                errors.textContent = `An unexpected error occurred: ${error.message}`;
            } finally {
                 // Ensure UI is re-enabled in case of early errors before reader setup
                 // Check if reader is processing, otherwise enable now
                 if (!fileInput.files[0] || !rules[fileTypeDropdown.value]) {
                    fileInput.disabled = false;
                    validateButton.disabled = false;
                    clearButton.disabled = false;
                    fileTypeDropdown.disabled = false;
                 }
            }
        }, 10); // Small timeout allows "Validating..." message to render
    });

    clearButton.addEventListener('click', () => {
        errors.textContent = '';
        fileInput.value = ''; // Clears the selected file in the input
    });

</script>
