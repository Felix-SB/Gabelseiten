<style>
  .fullwidth_banner {
    height: auto;
    width: 100%;
    display: flex;

  #headline_box {

  .fullwidth {

    width: 100%;

    margin: -12px;
    margin-top: 12px;
  }

  .box {
    width: 33.3333%;

    margin: 12px;

  }

    transform: scale(1.2);
    transition: all .9s;

  }

  .bild>div {
    height: 100%;
    width: 100%;

  .box_2 {

  a.box:hover,
  a.box:active {
    text-decoration: none;
  }

  .box a:link,
  .box a:visited,
  .box a:hover,
  .box a:active {
    text-decoration: none;
  }

  .box_2 a:link,
  .box_2 a:visited,
  .box_2 a:hover,
  .box_2 a:active {
    text-decoration: none;
  }

  #gelb {
    display: block;
    background: #76b82a;
    position: relative;
  }

  .bild {
    width: 100%;
    height: 232px;
    background: white;
    border-radius: 8px 8px 0px 0px;
    overflow: hidden;
  }

  .box_2 .bild {
    width: 100%;
    height: 360px;
    background: white;
    border-radius: 8px 8px 0px 0px;
  }


  #eins {
    background-image: url("https://cloud.servicebund.de/f/3766489b51b340f2b27d/?dl=1");
    background-size: cover;
    background-position: 50% 50%;
    background-repeat: no-repeat;
  }


  #zwei {
    background-image: url("https://cloud.servicebund.de/f/b86fec6b8c6f45cfb798/?dl=1");
    background-size: cover;
    background-position: 50% 50%;
    background-repeat: no-repeat;
  }


  p.überschrift {
    margin: 17px 24px 16px;
    font-size: 32px;
    color: white;
  }

  p.gesamtsortiment {
    margin: 0% 24px;
    font-size: 20px;
    color: white;
  }


  p.überschrift_warengruppe {
    margin: 3% 3% 2%;
    font-size: 22px;
    color: #20231C;
  }

  p.text_warengruppe {
    margin: 10px 3%;
    font-size: 18px;
    color: #20231C;
  }

  #pfeil {
    position: absolute;
    width: 80px;
    height: 80px;
    float: right;
    right: 24px;
    bottom: 24px;
  }

  #clickable {
    height: 100%;
    width: 100%;
    left: 0;
    top: 0;
    position: absolute;
    z-index: 1;
  }


  @media (max-width: 920px) {
    #flexbox {
      flex-direction: column;
    }

    .box {
      width: 100%;
      margin: 10px auto;
    }

    .box_2 {
      width: 100%;
      margin: 10px auto;
      height: auto;
    }

    .box_2 .bild {
      width: 100%;
      height: 250px;
      background: white;
      border-radius: 8px 8px 0px 0px;

    }
    #headline_box{
    width: 100%;
    border-radius: 0 0 8px 8px;
    }

    #headline_box img{
    margin: 10px 0px !important;

  }
  .fullwidth_banner {
    width: calc(100% + 24px);
    display: flex;
    height: auto;
    margin: -12px;
    margin-bottom: 24px;
    flex-direction: column-reverse;
}

}
